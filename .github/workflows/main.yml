name: Build Arabic Games Translator APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Extract Android project
        shell: bash
        run: |
          rm -rf extracted
          mkdir -p extracted

          unzip -o \
            Arabic-Games-Translator-Android-v1.0.zip \
            -d extracted

          test -f extracted/Arabic-Games-/settings.gradle.kts
          test -f extracted/Arabic-Games-/app/build.gradle.kts

      - name: Run Python tests
        working-directory: extracted/Arabic-Games-
        shell: bash
        run: |
          python -m unittest discover -s tests -v

      - name: Generate Gradle Wrapper
        working-directory: extracted/Arabic-Games-
        shell: bash
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: extracted/Arabic-Games-
        shell: bash
        run: |
          ./gradlew --no-daemon clean assembleDebug

      - name: Verify APK
        shell: bash
        run: |
          test -f \
            extracted/Arabic-Games-/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Arabic-Games-Translator-debug-apk
          path: extracted/Arabic-Games-/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
