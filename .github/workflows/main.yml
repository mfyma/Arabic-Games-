cd /workspaces/Arabic-Games-

mkdir -p .github/workflows

cat > .github/workflows/main.yml <<'YAML'
name: Build Arabic Games Translator APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Extract project
        run: |
          rm -rf extracted
          mkdir -p extracted
          unzip -o Arabic-Games-Translator-Android-v1.0.zip -d extracted
          test -f extracted/Arabic-Games-/settings.gradle.kts

      - name: Test Python engine
        working-directory: extracted/Arabic-Games-
        run: python -m unittest discover -s tests -v

      - name: Generate Gradle Wrapper
        working-directory: extracted/Arabic-Games-
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build Debug APK
        working-directory: extracted/Arabic-Games-
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Arabic-Games-Translator-debug-apk
          path: extracted/Arabic-Games-/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
YAML

git add .github/workflows/main.yml
git commit -m "Fix APK build workflow"
git push origin main
